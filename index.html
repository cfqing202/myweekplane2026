<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>周月计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #fff;
            padding: 0;
            color: #333;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 40px 30px;
        }

        .login-overlay.show {
            display: flex;
        }

        .login-icon {
            font-size: 56px;
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 15px;
            color: #999;
            margin-bottom: 36px;
        }

        .login-input-group {
            width: 100%;
            max-width: 320px;
        }

        .login-input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .login-input-group input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 20px;
            letter-spacing: 4px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        .login-input-group input:focus {
            border-color: #333;
        }

        .login-input-group input::placeholder {
            font-size: 15px;
            letter-spacing: 0;
            color: #ccc;
        }

        .login-btn {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s;
        }

        .login-btn:active {
            opacity: 0.8;
        }

        .login-error {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .user-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #eee;
        }

        .user-bar.show {
            display: flex;
        }

        .user-bar-phone {
            font-size: 14px;
            color: #666;
        }

        .user-bar-logout {
            font-size: 14px;
            color: #ff3b30;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
        }

        .user-bar-logout:active {
            opacity: 0.7;
        }

        .main-content {
            display: none;
            padding: 20px;
        }

        .main-content.show {
            display: block;
        }

        .type-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: 1px solid #333;
            background: #fff;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: #333;
            color: #fff;
        }

        .time-select {
            margin-bottom: 24px;
        }

        .time-label {
            font-size: 15px;
            margin-bottom: 12px;
            color: #666;
        }

        .time-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .time-item {
            padding: 14px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            white-space: nowrap;
        }

        .time-item.active {
            border-color: #333;
            background: #eaeaea;
            font-weight: 500;
        }

        .extra-btn {
            border: 1px solid #333;
            color: #333;
            background: #f9f9f9;
            font-weight: 500;
        }

        .add-btn {
            width: 100%;
            padding: 18px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            margin-bottom: 24px;
            cursor: pointer;
            font-weight: 500;
        }

        .input-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: #fff;
            width: 90%;
            border-radius: 12px;
            padding: 24px;
        }

        .modal-title {
            font-size: 19px;
            margin-bottom: 18px;
            text-align: center;
            font-weight: 500;
        }

        #planInput {
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            resize: none;
            height: 100px;
        }

        .word-count {
            font-size: 13px;
            color: #999;
            text-align: right;
            margin-bottom: 18px;
        }

        #autoGenerateWrapper {
            display: none;
            margin-bottom: 18px;
        }

        #autoGenerateWrapper label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #666;
            cursor: pointer;
        }

        #autoGenerateWrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .cancel {
            background: #eee;
            color: #333;
        }

        .confirm {
            background: #333;
            color: #fff;
        }

        .plan-box {
            background: #fff;
        }

        .plan-time-group {
            margin-bottom: 28px;
        }

        .plan-time-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .plan-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: none;
            padding-left: 30px;
        }

        .plan-index {
            font-size: 17px;
            color: #333;
            width: 28px;
            text-align: left;
        }

        .plan-text {
            font-size: 16px;
            flex: 1;
            color: #333;
        }

        .del-btn {
            color: #ff3b30;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-tip {
            text-align: center;
            padding: 60px 0;
            color: #999;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-icon">📋</div>
        <div class="login-title">周月计划</div>
        <div class="login-subtitle">请输入手机号码开始使用</div>
        <div class="login-input-group">
            <label>手机号码</label>
            <input type="text" id="phoneInput" inputmode="numeric" maxlength="11" placeholder="请输入11位手机号码" autocomplete="off">
        </div>
        <button class="login-btn" id="loginBtn">登 录</button>
        <div class="login-error" id="loginError">请输入正确的11位手机号码</div>
    </div>

    <div class="user-bar" id="userBar">
        <span class="user-bar-phone" id="userPhoneDisplay"></span>
        <button class="user-bar-logout" id="logoutBtn">退出登录</button>
    </div>

    <div class="main-content" id="mainContent">
        <div class="type-tabs">
            <button class="tab-btn active" data-type="week">周计划</button>
            <button class="tab-btn" data-type="month">月计划</button>
        </div>

        <div class="time-select">
            <div class="time-label">选择时间（仅新增使用）</div>
            <div class="time-list" id="timeList"></div>
        </div>

        <button class="add-btn" id="addBtn">+ 新增计划记录</button>

        <div class="plan-box" id="planList"></div>
    </div>

    <div class="input-modal" id="inputModal">
        <div class="modal-content">
            <div class="modal-title">添加计划</div>
            <textarea id="planInput" placeholder="请输入计划内容（20字以内）" maxlength="20" spellcheck="false"></textarea>
            <div class="word-count"><span id="currentWord">0</span>/20</div>
            <div id="autoGenerateWrapper">
                <label>
                    <input type="checkbox" id="autoGenerateCheck"> 是否每月零点自动生成
                </label>
            </div>
            <div class="modal-btns">
                <button class="modal-btn cancel" id="cancelBtn">取消</button>
                <button class="modal-btn confirm" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        var SUPABASE_URL = 'https://bmtvbpnjhgzcnaztvllk.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtdHZicG5qaGd6Y25henR2bGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDgxMDEsImV4cCI6MjA5Mjk4NDEwMX0.lcdPdzXSAQv8PURAP5_AiniPZZN64R1teu317asY6JA';
        var supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        var currentType = 'week';
        var currentTime = '';
        var currentTimeKey = 'currWeek';
        var currentPhone = '';
        var currentUserId = '';
        var planData = [];
        var isExpanded = false;
        var expandType = '';
        var isLoading = false;

        var now = new Date();
        var currYear = now.getFullYear();
        var currMonth = now.getMonth() + 1;

        function getOffsetMonth(offset) {
            var d = new Date(currYear, currMonth - 1 + offset, 1);
            return {
                year: d.getFullYear(),
                month: d.getMonth() + 1
            };
        }

        function getMonthStr(year, month) {
            return year + '年' + month + '月';
        }

        function getCurrentMonthStr() {
            return getMonthStr(currYear, currMonth);
        }

        function getLastMonthStr() {
            var m = getOffsetMonth(-1);
            return getMonthStr(m.year, m.month);
        }

        function getNextMonthStr() {
            var m = getOffsetMonth(1);
            return getMonthStr(m.year, m.month);
        }

        function addDays(date, days) {
            var result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        function getMonthStrOfDate(date) {
            return getMonthStr(date.getFullYear(), date.getMonth() + 1);
        }

        function getWeekOfMonth(date) {
            var year = date.getFullYear();
            var month = date.getMonth();
            var day = date.getDate();
            var firstDay = new Date(year, month, 1);
            var firstDayOfWeek = firstDay.getDay();
            var firstDayWeek = firstDayOfWeek === 0 ? 7 : firstDayOfWeek;
            return Math.ceil((day + firstDayWeek - 1) / 7);
        }

        function getWeekLabel(date) {
            var year = date.getFullYear();
            var month = date.getMonth() + 1;
            var week = getWeekOfMonth(date);
            return year + '年' + month + '月-' + week + '周';
        }

        function getMonthWeeks(year, month) {
            var firstDay = new Date(year, month - 1, 1);
            var lastDay = new Date(year, month, 0);
            var firstDayWeek = firstDay.getDay() || 7;
            var totalDays = lastDay.getDate();
            return Math.ceil((totalDays + firstDayWeek - 1) / 7);
        }

        function maskPhone(phone) {
            if (phone.length !== 11) return phone;
            return phone.substring(0, 3) + '****' + phone.substring(7);
        }

        // ========== Supabase 数据操作 ==========

        function mapDbPlanToLocal(row) {
            return {
                id: row.id,
                type: row.type,
                time: row.time,
                content: row.content,
                autoGenerate: row.auto_generate
            };
        }

        function mapLocalToDb(plan) {
            return {
                user_id: currentUserId,
                type: plan.type,
                time: plan.time,
                content: plan.content,
                auto_generate: plan.autoGenerate || false,
                is_auto_generated: plan.isAutoGenerated || false,
                template_id: null
            };
        }

        async function setUserContext() {
            await supabase.rpc('set_user_phone', { phone: currentPhone });
        }

        async function fetchPlansFromDb() {
            await setUserContext();
            var res = await supabase
                .from('plans')
                .select('*')
                .eq('user_id', currentUserId)
                .order('created_at', { ascending: false });

            if (res.error) {
                console.error('加载计划失败:', res.error);
                return [];
            }
            return (res.data || []).map(mapDbPlanToLocal);
        }

        async function insertPlanToDb(plan) {
            await setUserContext();
            var res = await supabase
                .from('plans')
                .insert(mapLocalToDb(plan))
                .select();

            if (res.error) {
                console.error('插入计划失败:', res.error);
                return null;
            }
            if (res.data && res.data.length > 0) {
                return mapDbPlanToLocal(res.data[0]);
            }
            return null;
        }

        async function deletePlanFromDb(planId) {
            await setUserContext();
            var res = await supabase
                .from('plans')
                .delete()
                .eq('id', planId);

            if (res.error) {
                console.error('删除计划失败:', res.error);
                return false;
            }
            return true;
        }

        // ========== 登录 / 退出 ==========

        async function initLogin() {
            var savedPhone = localStorage.getItem('currentUserPhone');
            if (savedPhone && savedPhone.length === 11) {
                currentPhone = savedPhone;
                var userId = await lookupUserId(savedPhone);
                if (userId) {
                    currentUserId = userId;
                    enterApp();
                    return;
                }
            }
            showLogin();
        }

        async function lookupUserId(phone) {
            var res = await supabase
                .from('users')
                .select('id')
                .eq('phone', phone)
                .limit(1);

            if (res.error) {
                console.error('查询用户失败:', res.error);
                return null;
            }
            if (res.data && res.data.length > 0) {
                return res.data[0].id;
            }
            return null;
        }

        async function createUser(phone) {
            var res = await supabase
                .from('users')
                .insert({ phone: phone })
                .select();

            if (res.error) {
                console.error('创建用户失败:', res.error);
                return null;
            }
            if (res.data && res.data.length > 0) {
                return res.data[0].id;
            }
            return null;
        }

        function showLogin() {
            document.getElementById('loginOverlay').classList.add('show');
            document.getElementById('userBar').classList.remove('show');
            document.getElementById('mainContent').classList.remove('show');
            document.getElementById('phoneInput').value = '';
            document.getElementById('loginError').classList.remove('show');
        }

        async function enterApp() {
            document.getElementById('loginOverlay').classList.remove('show');
            document.getElementById('userBar').classList.add('show');
            document.getElementById('mainContent').classList.add('show');

            document.getElementById('userPhoneDisplay').innerText = '用户：' + maskPhone(currentPhone);

            planData = await fetchPlansFromDb();
            await autoGeneratePlans();
            initTimeList();
            bindEvents();
        }

        function logout() {
            localStorage.removeItem('currentUserPhone');
            currentPhone = '';
            currentUserId = '';
            planData = [];
            document.getElementById('timeList').replaceWith(document.getElementById('timeList').cloneNode(true));
            document.getElementById('addBtn').replaceWith(document.getElementById('addBtn').cloneNode(true));
            document.getElementById('saveBtn').replaceWith(document.getElementById('saveBtn').cloneNode(true));
            showLogin();
        }

        // ========== 登录事件 ==========

        document.getElementById('phoneInput').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '');
            document.getElementById('loginError').classList.remove('show');
        });

        document.getElementById('loginBtn').addEventListener('click', async function () {
            var phone = document.getElementById('phoneInput').value.replace(/\D/g, '');
            if (phone.length !== 11) {
                document.getElementById('loginError').classList.add('show');
                return;
            }

            var btn = this;
            btn.disabled = true;
            btn.innerText = '登录中...';

            currentPhone = phone;
            var userId = await lookupUserId(phone);
            if (!userId) {
                userId = await createUser(phone);
            }

            btn.disabled = false;
            btn.innerText = '登 录';

            if (!userId) {
                document.getElementById('loginError').innerText = '登录失败，请检查网络后重试';
                document.getElementById('loginError').classList.add('show');
                return;
            }

            currentUserId = userId;
            localStorage.setItem('currentUserPhone', phone);
            enterApp();
        });

        document.getElementById('phoneInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function () {
            logout();
        });

        // ========== 主功能 ==========

        function initTimeList() {
            var timeList = document.getElementById('timeList');
            timeList.innerHTML = '';
            isExpanded = false;
            expandType = '';

            if (currentType === 'week') {
                var today = new Date();
                var lastWeekDate = addDays(today, -7);
                var nextWeekDate = addDays(today, 7);

                var weekBtns = [
                    { name: getWeekLabel(lastWeekDate), key: 'lastWeek', timeValue: getWeekLabel(lastWeekDate) },
                    { name: getWeekLabel(today), key: 'currWeek', timeValue: getWeekLabel(today) },
                    { name: getWeekLabel(nextWeekDate), key: 'nextWeek', timeValue: getWeekLabel(nextWeekDate) },
                    { name: '本月全部', key: 'monthAll', timeValue: '', extra: true }
                ];
                weekBtns.forEach(function (btn) {
                    var item = document.createElement('div');
                    item.className = 'time-item' + (btn.extra ? ' extra-btn' : '');
                    item.innerText = btn.name;
                    item.dataset.timeKey = btn.key;
                    item.dataset.timeValue = btn.timeValue;
                    if (btn.key === 'currWeek') item.classList.add('active');
                    timeList.appendChild(item);
                });
            } else {
                var monthBtns = [
                    { name: getLastMonthStr(), key: 'lastMonth', timeValue: getLastMonthStr() },
                    { name: getCurrentMonthStr(), key: 'currMonth', timeValue: getCurrentMonthStr() },
                    { name: getNextMonthStr(), key: 'nextMonth', timeValue: getNextMonthStr() },
                    { name: '查看全年月份', key: 'showAll', timeValue: '', extra: true }
                ];
                monthBtns.forEach(function (btn) {
                    var item = document.createElement('div');
                    item.className = 'time-item' + (btn.extra ? ' extra-btn' : '');
                    item.innerText = btn.name;
                    item.dataset.timeKey = btn.key;
                    item.dataset.timeValue = btn.timeValue;
                    if (btn.key === 'currMonth') item.classList.add('active');
                    timeList.appendChild(item);
                });
            }

            bindTimeItemActive();
            renderAllPlans();
        }

        function bindTimeItemActive() {
            document.querySelectorAll('.time-item').forEach(function (item) {
                if (item.classList.contains('active')) {
                    currentTime = item.dataset.timeValue || item.dataset.timeKey;
                    currentTimeKey = item.dataset.timeKey;
                }
            });
        }

        function expandMonthAll() {
            var timeList = document.getElementById('timeList');
            timeList.innerHTML = '';
            isExpanded = true;
            expandType = 'monthAll';
            currentTimeKey = 'monthAll';

            var lastMonth = getOffsetMonth(-1);
            var lastMonthWeeks = getMonthWeeks(lastMonth.year, lastMonth.month);
            var currMonthWeeks = getMonthWeeks(currYear, currMonth);

            var lastWeekLabel = lastMonth.year + '年' + lastMonth.month + '月-' + lastMonthWeeks + '周';
            var el = document.createElement('div');
            el.className = 'time-item active';
            el.innerText = lastWeekLabel;
            el.dataset.timeKey = 'lastWeekOfLastMonth';
            el.dataset.timeValue = lastWeekLabel;
            timeList.appendChild(el);

            for (var w = 1; w <= currMonthWeeks; w++) {
                var label = currYear + '年' + currMonth + '月-' + w + '周';
                var el2 = document.createElement('div');
                el2.className = 'time-item';
                el2.innerText = label;
                el2.dataset.timeKey = 'currWeek' + w;
                el2.dataset.timeValue = label;
                timeList.appendChild(el2);
            }

            var collapseEl = document.createElement('div');
            collapseEl.className = 'time-item extra-btn';
            collapseEl.innerText = '⬆️ 收起';
            collapseEl.dataset.timeKey = 'collapse';
            timeList.appendChild(collapseEl);

            currentTime = lastWeekLabel;

            renderAllPlans();
        }

        function expandShowAll() {
            var timeList = document.getElementById('timeList');
            timeList.innerHTML = '';
            isExpanded = true;
            expandType = 'showAll';
            currentTimeKey = 'showAll';

            for (var m = currMonth; m <= 12; m++) {
                var label = getMonthStr(currYear, m);
                var el = document.createElement('div');
                el.className = 'time-item' + (m === currMonth ? ' active' : '');
                el.innerText = label;
                el.dataset.timeKey = 'showAllMonth' + m;
                el.dataset.timeValue = label;
                timeList.appendChild(el);
            }

            var collapseEl = document.createElement('div');
            collapseEl.className = 'time-item extra-btn';
            collapseEl.innerText = '⬆️ 收起';
            collapseEl.dataset.timeKey = 'collapse';
            timeList.appendChild(collapseEl);

            currentTime = getCurrentMonthStr();

            renderAllPlans();
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    currentType = this.dataset.type;
                    initTimeList();
                });
            });

            document.getElementById('timeList').addEventListener('click', function (e) {
                var target = e.target;
                if (!target.classList.contains('time-item')) return;

                var timeKey = target.dataset.timeKey;

                if (timeKey === 'collapse') {
                    initTimeList();
                    return;
                }

                if (!isExpanded && currentType === 'week' && timeKey === 'monthAll') {
                    expandMonthAll();
                    return;
                }
                if (!isExpanded && currentType === 'month' && timeKey === 'showAll') {
                    expandShowAll();
                    return;
                }

                document.querySelectorAll('.time-item').forEach(function (i) { i.classList.remove('active'); });
                target.classList.add('active');
                currentTime = target.dataset.timeValue || target.dataset.timeKey;
                currentTimeKey = timeKey;

                renderAllPlans();
            });

            document.getElementById('addBtn').addEventListener('click', function () {
                var autoGenWrapper = document.getElementById('autoGenerateWrapper');
                if (currentType === 'month') {
                    autoGenWrapper.style.display = 'block';
                } else {
                    autoGenWrapper.style.display = 'none';
                }
                document.getElementById('autoGenerateCheck').checked = false;
                document.getElementById('inputModal').style.display = 'flex';
                document.getElementById('planInput').value = '';
                document.getElementById('currentWord').innerText = '0';
            });

            document.getElementById('cancelBtn').addEventListener('click', function () {
                document.getElementById('inputModal').style.display = 'none';
            });

            document.getElementById('inputModal').addEventListener('click', function (e) {
                if (e.target === this) {
                    this.style.display = 'none';
                }
            });

            document.getElementById('planInput').addEventListener('input', function () {
                document.getElementById('currentWord').innerText = this.value.length;
            });

            document.getElementById('saveBtn').addEventListener('click', async function () {
                var content = document.getElementById('planInput').value.trim();
                if (!content) return alert('请输入计划内容');
                if (content.length > 20) return alert('不能超过20字');

                var autoGenerate = currentType === 'month' && document.getElementById('autoGenerateCheck').checked;

                var newPlan = {
                    type: currentType,
                    time: currentTime,
                    content: content,
                    autoGenerate: autoGenerate
                };

                document.getElementById('saveBtn').disabled = true;
                document.getElementById('saveBtn').innerText = '保存中...';

                var saved = await insertPlanToDb(newPlan);

                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').innerText = '保存';

                if (saved) {
                    planData.unshift(saved);
                    document.getElementById('inputModal').style.display = 'none';
                    renderAllPlans();
                } else {
                    alert('保存失败，请检查网络后重试');
                }
            });
        }

        function renderAllPlans() {
            var wrap = document.getElementById('planList');

            var filtered = planData.filter(function (item) { return item.type === currentType; });

            if (filtered.length === 0) {
                wrap.innerHTML = '<div class="empty-tip">暂无计划记录</div>';
                return;
            }

            var groupMap = {};
            filtered.forEach(function (item) {
                if (!groupMap[item.time]) groupMap[item.time] = [];
                groupMap[item.time].push(item);
            });

            var sortedTimes = Object.keys(groupMap).sort(function (a, b) {
                var aParts = a.replace('年', '-').replace('月', '').split('-');
                var bParts = b.replace('年', '-').replace('月', '').split('-');
                var aVal = parseInt(aParts[0]) * 100 + parseInt(aParts[1]);
                var bVal = parseInt(bParts[0]) * 100 + parseInt(bParts[1]);
                return bVal - aVal;
            });

            var html = '';
            sortedTimes.forEach(function (timeKey) {
                html += '<div class="plan-time-group">' +
                    '<div class="plan-time-title">📅 ' + timeKey + '</div>';
                groupMap[timeKey].forEach(function (item, idx) {
                    html +=
                        '<div class="plan-item">' +
                            '<div class="plan-index">' + (idx + 1) + '</div>' +
                            '<div class="plan-text">' + item.content + '</div>' +
                            '<div class="del-btn" data-id="' + item.id + '">✕</div>' +
                        '</div>';
                });
                html += '</div>';
            });

            wrap.innerHTML = html;
            bindDelEvent();
        }

        function bindDelEvent() {
            document.querySelectorAll('.del-btn').forEach(function (btn) {
                btn.addEventListener('click', async function () {
                    if (isLoading) return;
                    isLoading = true;

                    var planId = this.dataset.id;
                    var success = await deletePlanFromDb(planId);

                    if (success) {
                        planData = planData.filter(function (item) { return item.id !== planId; });
                        renderAllPlans();
                    } else {
                        alert('删除失败，请检查网络后重试');
                    }

                    isLoading = false;
                });
            });
        }

        async function autoGeneratePlans() {
            var lastAutoGenMonth = localStorage.getItem('lastAutoGenerateMonth_' + currentPhone) || '';
            var currentMonthStr = getCurrentMonthStr();

            if (lastAutoGenMonth === currentMonthStr) return;

            var autoPlans = planData.filter(function (item) {
                return item.type === 'month' && item.autoGenerate === true;
            });

            if (autoPlans.length === 0) {
                localStorage.setItem('lastAutoGenerateMonth_' + currentPhone, currentMonthStr);
                return;
            }

            var hasNewPlan = false;
            for (var i = 0; i < autoPlans.length; i++) {
                var autoPlan = autoPlans[i];
                var exists = planData.some(function (item) {
                    return item.type === 'month' &&
                           item.time === currentMonthStr &&
                           item.content === autoPlan.content;
                });

                if (!exists) {
                    var newPlan = {
                        type: 'month',
                        time: currentMonthStr,
                        content: autoPlan.content,
                        autoGenerate: true,
                        isAutoGenerated: true
                    };
                    var saved = await insertPlanToDb(newPlan);
                    if (saved) {
                        planData.unshift(saved);
                        hasNewPlan = true;
                    }
                }
            }

            localStorage.setItem('lastAutoGenerateMonth_' + currentPhone, currentMonthStr);
            if (hasNewPlan) {
                renderAllPlans();
            }
        }

        // ========== 启动 ==========

        window.onload = function () {
            initLogin();
        }
    </script>
</body>
</html>
